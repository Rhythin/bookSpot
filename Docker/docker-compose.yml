version: '3.8'

services:
  # Postgres service for auth, books, and notification databases
  postgres:
    image: postgres:16-alpine
    container_name: bookspot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Kafka in KRaft mode (Bitnami image)
  kafka:
    image: bitnami/kafka:3.7-debian-12
    container_name: bookspot-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_KRAFT_CLUSTER_ID=67D6C789-9F4F-4C8E-9E7B-0A0A0A0A0A0A
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger All-in-One for tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: bookspot-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP (gRPC)
      - "4318:4318"   # OTLP (HTTP)
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  # Auth Service
  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8080:8080"
    environment:
      - ENV=DOCKER
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=auth_db
      - DB_SSL_MODE=disable
      - JWT_SECRET=your_super_secret_key_change_this_in_production
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy

  # Books Service
  books-service:
    build:
      context: ..
      dockerfile: services/books-service/Dockerfile
    container_name: books-service
    ports:
      - "8081:8081"
    environment:
      - ENV=DOCKER
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=books_db
      - DB_SSL_MODE=disable
      - JWT_SECRET=your_super_secret_key_change_this_in_production
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4318
    depends_on:
      postgres:
        condition: service_healthy

  # Notification Service
  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8082:8082"
    environment:
      - ENV=DOCKER
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=notification_db
      - DB_SSL_MODE=disable
      - JWT_SECRET=your_super_secret_key_change_this_in_production
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4318
      - KAFKA_BROKERS=kafka:9092
      - SVC_CODE=NOTIFICATION
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
