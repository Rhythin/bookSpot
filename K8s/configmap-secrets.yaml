apiVersion: v1
kind: ConfigMap
metadata:
  name: bookspot-config
  namespace: bookspot
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: postgres
  DB_SSL_MODE: disable
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
  KAFKA_BROKERS: kafka:9092

---
apiVersion: v1
kind: Secret
metadata:
  name: bookspot-secrets
  namespace: bookspot
type: Opaque
stringData:
  DB_PASSWORD: postgres
  JWT_SECRET: your_super_secret_key_change_this_in_production
